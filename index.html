<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ju Woocheol — Portfolio</title>
  <meta name="description" content="Engineering portfolio — 3,571 commits, 754+ PRs across 34 repositories">
  <meta property="og:title" content="Ju Woocheol — Engineering Portfolio">
  <meta property="og:description" content="CDO / Tech Lead — fullstack engineering with AI-augmented workflows">
  <meta property="og:url" content="https://juuc.github.io/portfolio">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27><rect fill=%27%233b82f6%27 rx=%2714%27 width=%27100%27 height=%27100%27/><text x=%2750%27 y=%2752%27 font-size=%2738%27 fill=%27white%27 text-anchor=%27middle%27 dominant-baseline=%27central%27 font-family=%27system-ui%27 font-weight=%27700%27>JW</text></svg>">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg: #09090b;
      --bg-sidebar: #0c0c0f;
      --surface: #18181b;
      --surface-hover: #1f1f23;
      --border: #27272a;
      --border-subtle: #1c1c1f;
      --text: #fafafa;
      --text-secondary: #a1a1aa;
      --text-muted: #71717a;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --accent-subtle: rgba(59,130,246,0.08);
      --success: #10b981;
      --radius: 8px;
      --radius-lg: 12px;
      --sidebar-w: 260px;
      --mobile-header-h: 56px;
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      --font-mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ==================== Layout ==================== */
    .sidebar {
      position: fixed; left: 0; top: 0; bottom: 0;
      width: var(--sidebar-w);
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      z-index: 50;
      transition: transform 0.3s ease;
    }
    .main {
      margin-left: var(--sidebar-w);
      min-height: 100vh;
    }
    .content {
      max-width: 800px;
      margin: 0 auto;
      padding: 48px 32px 80px;
    }

    /* ==================== Mobile Header ==================== */
    .mobile-bar {
      display: none;
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--mobile-header-h);
      background: rgba(9,9,11,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      z-index: 40;
    }
    .hamburger {
      background: none; border: none; cursor: pointer;
      width: 36px; height: 36px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 5px;
    }
    .hamburger span {
      display: block; width: 20px; height: 2px;
      background: var(--text-secondary);
      border-radius: 1px;
      transition: transform 0.3s, opacity 0.3s;
    }
    .hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(2.5px, 2.5px); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(2.5px, -2.5px); }
    .mobile-title {
      font-weight: 700; font-size: 15px; color: var(--text);
      letter-spacing: -0.01em;
    }
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 45;
      opacity: 0; transition: opacity 0.3s;
    }
    .overlay.visible { display: block; opacity: 1; }

    /* ==================== Sidebar ==================== */
    .sidebar-profile {
      padding: 24px 20px 20px;
      border-bottom: 1px solid var(--border);
    }
    .avatar {
      width: 44px; height: 44px;
      background: var(--accent);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 16px; color: #fff;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }
    .profile-name {
      font-weight: 700; font-size: 16px; color: var(--text);
      letter-spacing: -0.02em;
    }
    .profile-name-alt {
      font-size: 13px; color: var(--text-muted);
      margin-top: 1px;
    }
    .profile-title {
      font-size: 13px; color: var(--text-secondary);
      margin-top: 4px;
    }

    .sidebar-nav {
      flex: 1; overflow-y: auto;
      padding: 8px 10px;
    }
    .nav-item {
      display: block;
      padding: 7px 10px;
      border-radius: 6px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      transition: background 0.15s, color 0.15s;
      cursor: pointer;
    }
    .nav-item:hover {
      background: var(--surface);
      color: var(--text);
    }
    .nav-item.active {
      background: var(--accent-subtle);
      color: var(--accent);
      font-weight: 500;
    }
    .nav-sub { padding-left: 22px; font-size: 13px; }
    .nav-group-label {
      padding: 16px 10px 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }
    .nav-divider {
      height: 1px;
      background: var(--border);
      margin: 8px 10px;
    }
    .nav-sub-divider {
      height: 1px;
      background: var(--border-subtle);
      margin: 4px 22px;
    }

    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 12px;
    }
    .lang-toggle {
      display: inline-flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      align-self: flex-start;
    }
    .lang-btn {
      padding: 6px 16px;
      font-size: 13px; font-weight: 500;
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      font-family: var(--font-sans);
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .lang-btn:hover:not(.active) {
      background: rgba(255,255,255,0.06);
      color: var(--text-secondary);
    }
    .lang-btn.active {
      background: var(--accent);
      color: #fff;
    }
    .sidebar-link {
      display: flex; align-items: center; gap: 8px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 13px;
      transition: color 0.15s;
    }
    .sidebar-link:hover { color: var(--text-secondary); }
    .sidebar-link svg { flex-shrink: 0; }

    /* ==================== Home: Hero ==================== */
    .hero { margin-bottom: 40px; }
    .hero-name {
      font-size: 2.25rem; font-weight: 700;
      letter-spacing: -0.03em; line-height: 1.15;
      margin-bottom: 4px;
    }
    .hero-title {
      font-size: 1.1rem; color: var(--accent);
      font-weight: 500; margin-bottom: 6px;
    }
    .hero-edu {
      font-size: 14px; color: var(--text-muted);
      margin-bottom: 16px;
    }
    .hero-intro {
      font-size: 15px; color: var(--text-secondary);
      max-width: 560px; line-height: 1.65;
      margin-bottom: 20px;
    }
    .hero-links { display: flex; gap: 12px; flex-wrap: wrap; }
    .hero-link {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 13px; font-weight: 500;
      transition: border-color 0.15s, color 0.15s;
    }
    .hero-link:hover {
      border-color: var(--text-muted);
      color: var(--text);
    }

    /* ==================== Home: Stats ==================== */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 48px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 16px;
      text-align: center;
    }
    .stat-value {
      font-size: 1.5rem; font-weight: 700;
      letter-spacing: -0.02em;
      font-family: var(--font-mono);
      color: var(--text);
    }
    .stat-label {
      font-size: 12px; color: var(--text-muted);
      margin-top: 4px; text-transform: uppercase;
      letter-spacing: 0.03em; font-weight: 500;
    }

    /* ==================== Home: Career ==================== */
    .section-title {
      font-size: 1.1rem; font-weight: 600;
      letter-spacing: -0.01em;
      margin-bottom: 16px;
      color: var(--text);
    }
    .career-list {
      display: flex; flex-direction: column; gap: 12px;
      margin-bottom: 48px;
    }
    .career-item {
      display: flex; gap: 16px; align-items: flex-start;
      padding: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .career-period {
      font-size: 13px; color: var(--text-muted);
      font-family: var(--font-mono);
      white-space: nowrap;
      padding-top: 1px;
    }
    .career-company {
      font-weight: 600; font-size: 15px; color: var(--text);
    }
    .career-type {
      font-weight: 400; font-size: 13px; color: var(--text-muted);
      margin-left: 4px;
    }
    .career-role {
      font-size: 14px; color: var(--text-secondary);
      margin-top: 2px;
    }

    /* ==================== Home: Projects ==================== */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 48px;
    }
    .project-card {
      display: block;
      padding: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-decoration: none;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }
    .project-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(59,130,246,0.08);
    }
    .project-metric {
      display: inline-block;
      font-size: 12px; font-weight: 600;
      font-family: var(--font-mono);
      color: var(--accent);
      background: var(--accent-subtle);
      padding: 2px 8px;
      border-radius: 4px;
      margin-bottom: 10px;
    }
    .project-name {
      font-size: 16px; font-weight: 600; color: var(--text);
      margin-bottom: 6px;
    }
    .project-impact {
      font-size: 13px; color: var(--text-secondary);
      line-height: 1.5;
    }

    /* ==================== Home: Other Projects ==================== */
    .other-projects {
      display: flex; flex-direction: column;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 48px;
    }
    .other-project-item {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px;
      background: var(--surface);
      text-decoration: none;
      transition: background 0.15s;
      border-bottom: 1px solid var(--border);
    }
    .other-project-item:last-child { border-bottom: none; }
    .other-project-item:hover { background: var(--surface-hover); }
    .other-project-name {
      font-size: 14px; font-weight: 500; color: var(--text);
      min-width: 140px;
    }
    .other-project-commits {
      font-size: 12px; font-family: var(--font-mono);
      color: var(--text-muted);
      min-width: 80px;
    }
    .other-project-desc {
      font-size: 13px; color: var(--text-secondary);
    }

    /* ==================== Home: Nav Cards ==================== */
    .nav-cards-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .nav-card {
      display: block;
      padding: 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-decoration: none;
      transition: border-color 0.2s;
    }
    .nav-card:hover { border-color: var(--text-muted); }
    .nav-card-label {
      font-size: 14px; font-weight: 600; color: var(--text);
      margin-bottom: 4px;
    }
    .nav-card-desc {
      font-size: 12px; color: var(--text-muted);
      line-height: 1.4;
    }

    /* ==================== Markdown Prose ==================== */
    .prose { animation: fadeIn 0.25s ease; }
    .prose h1 {
      font-size: 1.75rem; font-weight: 700;
      letter-spacing: -0.02em; line-height: 1.2;
      margin: 0 0 8px; padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .prose h2 {
      font-size: 1.25rem; font-weight: 600;
      letter-spacing: -0.01em;
      margin: 36px 0 12px;
      color: var(--text);
    }
    .prose h3 {
      font-size: 1.05rem; font-weight: 600;
      margin: 28px 0 8px;
      color: var(--text);
    }
    .prose h4 {
      font-size: 0.95rem; font-weight: 600;
      margin: 24px 0 8px;
      color: var(--text-secondary);
    }
    .prose p {
      margin: 0 0 16px;
      color: var(--text-secondary);
      line-height: 1.7;
    }
    .prose a {
      color: var(--accent);
      text-decoration: none;
    }
    .prose a:hover { text-decoration: underline; }
    .prose strong { color: var(--text); font-weight: 600; }
    .prose em { color: var(--text-secondary); }
    .prose ul, .prose ol {
      padding-left: 20px;
      margin: 0 0 16px;
      color: var(--text-secondary);
    }
    .prose li {
      margin-bottom: 6px;
      line-height: 1.6;
    }
    .prose li::marker { color: var(--text-muted); }
    .prose blockquote {
      border-left: 3px solid var(--accent);
      padding: 8px 16px;
      margin: 0 0 16px;
      background: var(--accent-subtle);
      border-radius: 0 var(--radius) var(--radius) 0;
    }
    .prose blockquote p {
      color: var(--text-secondary);
      margin: 0;
      font-size: 14px;
    }
    .prose code {
      font-family: var(--font-mono);
      font-size: 0.88em;
      background: var(--surface);
      padding: 2px 6px;
      border-radius: 4px;
      color: var(--accent);
    }
    .prose pre {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      overflow-x: auto;
      margin: 0 0 16px;
    }
    .prose pre code {
      background: none;
      padding: 0;
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.6;
    }
    .prose hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 32px 0;
    }
    .prose img {
      max-width: 100%;
      height: auto;
      border-radius: var(--radius);
      margin: 8px 0;
    }
    .prose table {
      width: 100%;
      border-collapse: collapse;
      margin: 0 0 20px;
      font-size: 14px;
    }
    .prose thead th {
      text-align: left;
      padding: 10px 14px;
      border-bottom: 2px solid var(--border);
      font-weight: 600;
      color: var(--text);
      font-size: 13px;
      white-space: nowrap;
    }
    .prose tbody td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border-subtle);
      color: var(--text-secondary);
      vertical-align: top;
    }
    .prose tbody tr:last-child td { border-bottom: none; }
    .prose tbody tr:hover { background: rgba(255,255,255,0.02); }
    .prose .table-wrap {
      overflow-x: auto;
      margin: 0 0 20px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .prose .table-wrap table { margin: 0; }
    .prose .table-wrap th:first-child,
    .prose .table-wrap td:first-child { padding-left: 16px; }

    /* ==================== Back Link ==================== */
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 13px; font-weight: 500;
      margin-bottom: 24px;
      transition: color 0.15s;
    }
    .back-link:hover { color: var(--text); }

    /* ==================== Loading / Error ==================== */
    .loading, .error-state {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 300px;
      color: var(--text-muted);
      font-size: 14px;
    }
    .loading-spinner {
      width: 24px; height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-bottom: 12px;
    }
    .error-state h2 {
      font-size: 18px; color: var(--text);
      margin-bottom: 8px;
    }

    /* ==================== Animations ==================== */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fade-in { animation: fadeIn 0.25s ease; }

    /* ==================== Responsive ==================== */
    @media (max-width: 900px) {
      .projects-grid { grid-template-columns: 1fr; }
      .nav-cards-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 768px) {
      .mobile-bar { display: flex; }
      .sidebar {
        transform: translateX(-100%);
        width: 280px;
        top: 0;
      }
      .sidebar.open { transform: translateX(0); }
      .main {
        margin-left: 0;
        padding-top: var(--mobile-header-h);
      }
      .content { padding: 24px 16px 60px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .hero-name { font-size: 1.75rem; }
      .career-item { flex-direction: column; gap: 4px; }
      .other-project-item { flex-wrap: wrap; }
      .other-project-name { min-width: auto; }
      .other-project-desc { width: 100%; }
      .nav-cards-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="mobile-bar" id="mobileBar">
    <button class="hamburger" id="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <span class="mobile-title">JW Portfolio</span>
    <div class="lang-toggle" id="mobileLang"></div>
  </header>
  <div class="overlay" id="overlay"></div>
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="content" id="content"></div>
  </main>

  <script>

    // ==================== Bilingual Data ====================

    // ==================== Render Markdown Page ====================
    async function renderMarkdownPage(route) {
      const mdFile = ROUTES[route]?.[lang];
      if (!mdFile) { render404(); return; }

      $content.innerHTML = '<div class="loading"><div class="loading-spinner"></div>Loading\u2026</div>';

      const cacheKey = lang + ':' + route;
      let md = mdCache[cacheKey];
      if (!md) {
        try {
          const res = await fetch(mdFile);
          if (!res.ok) throw new Error(res.status);
          md = await res.text();
          mdCache[cacheKey] = md;
        } catch {
          $content.innerHTML = `<div class="error-state"><h2>Content not found</h2><p>Could not load this page.</p><a href="#/" class="back-link">\u2190 ${DATA[lang].labels.back}</a></div>`;
          return;
        }
      }

      const html = marked.parse(md);
      $content.innerHTML = `
        <div class="fade-in">
          <a href="#/" class="back-link">\u2190 ${DATA[lang].labels.back}</a>
          <article class="prose">${html}</article>
        </div>
      `;
      handleInternalLinks();
    }

    // ==================== 404 ====================
    function render404() {
      $content.innerHTML = `<div class="error-state"><h2>Page not found</h2><a href="#/" class="back-link">\u2190 ${DATA[lang].labels.back}</a></div>`;
    }

    // ==================== Internal Link Handling ====================
    function handleInternalLinks() {
      $content.querySelectorAll('a').forEach(a => {
        const href = a.getAttribute('href');
        if (!href) return;
        if (href.startsWith('http://') || href.startsWith('https://')) {
          a.setAttribute('target', '_blank');
          a.setAttribute('rel', 'noopener');
          return;
        }
        if (href.endsWith('.md')) {
          a.addEventListener('click', e => {
            e.preventDefault();
            let route = href
              .replace(/^(\.\.\/)+/, '')
              .replace(/^(en|ko)\//, '')
              .replace(/\.md$/, '');
            if (route === 'README') { route = 'home'; }
            window.location.hash = route === 'home' ? '/' : '/' + route;
          });
        }
      });
    }

    // ==================== Router ====================
    function getRoute() {
      const hash = window.location.hash.slice(1).replace(/^\//, '') || '';
      return hash || 'home';
    }

    async function navigate() {
      const route = getRoute();
      if (route === 'home') {
        renderHome();
      } else if (ROUTES[route]) {
        await renderMarkdownPage(route);
      } else {
        render404();
      }
      updateActiveNav();
      closeMenu();
      window.scrollTo(0, 0);
    }

    function updateActiveNav() {
      const route = getRoute();
      $sidebar.querySelectorAll('.nav-item').forEach(item => {
        const r = item.dataset.route;
        item.classList.toggle('active', r === route);
      });
    }

    // ==================== Language ====================
    function setLang(newLang) {
      if (newLang === lang) return;
      lang = newLang;
      localStorage.setItem('portfolio-lang', lang);
      document.documentElement.lang = lang;
      // Clear cache to re-fetch in new language
      renderSidebar();
      navigate();
    }

    // ==================== Mobile Menu ====================
    function toggleMenu() {
      const open = $sidebar.classList.toggle('open');
      $hamburger.classList.toggle('open', open);
      $overlay.classList.toggle('visible', open);
      document.body.style.overflow = open ? 'hidden' : '';
    }
    function closeMenu() {
      $sidebar.classList.remove('open');
      $hamburger.classList.remove('open');
      $overlay.classList.remove('visible');
      document.body.style.overflow = '';
    }

    // ==================== Init ====================
    document.documentElement.lang = lang;
    $hamburger.addEventListener('click', toggleMenu);
    $overlay.addEventListener('click', closeMenu);
    window.addEventListener('hashchange', navigate);

    // Event delegation for lang buttons — survives re-renders
    document.addEventListener('click', e => {
      const btn = e.target.closest('.lang-btn');
      if (btn && btn.dataset.lang) {
        e.preventDefault();
        e.stopPropagation();
        setLang(btn.dataset.lang);
      }
    });

    renderSidebar();
    navigate();
  </script>
